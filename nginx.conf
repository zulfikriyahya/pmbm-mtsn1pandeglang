server {
    listen 80;
    listen [::]:80;
    server_name daftar.mtsn1pandeglang.sch.id;

    root /var/www/daftar/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.webmanifest {
        expires off;
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }

    error_page 404 /404.html;

    access_log /var/log/nginx/daftar.access.log;
    error_log  /var/log/nginx/daftar.error.log;
}
